name: Go Build

on:
  workflow_call:
    inputs:
      build-command:
        description: "Build command"
        required: false
        type: string
        default: "go build ./..."

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: ${{ inputs.build-command }}
